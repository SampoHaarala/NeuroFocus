<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroFOCUS - Calibration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        /* ============ STATUS BADGE ============ */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid #333;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            margin-bottom: 28px;
            animation: fadeInDown 0.6s ease-out 0.2s both;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10B981;
            box-shadow: 0 0 8px #10B981;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .status-text {
            font-size: 11px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 8px #10B981, 0 0 12px rgba(16, 185, 129, 0.4);
                opacity: 0.8;
            }
            50% {
                box-shadow: 0 0 16px #10B981, 0 0 24px rgba(16, 185, 129, 0.6);
                opacity: 1;
            }
        }

        /* ============ TITLE ============ */
        .title-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out 0.4s both;
        }

        .title {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: 4px;
            line-height: 1;
        }

        .title-neuro {
            color: #ffffff;
        }

        .title-flow {
            color: #8A2BE2;
            text-shadow: 0 0 10px #8A2BE2, 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .subtitle {
            font-size: 11px;
            color: #666;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* ============ CENTER SIMULATOR CIRCLE ============ */
        .simulator-circle {
            position: relative;
            width: 350px;
            height: 350px;
            aspect-ratio: 1 / 1;
            border: 1px solid #333;
            border-radius: 50%;
            margin-bottom: 50px; 
            animation: fadeIn 0.8s ease-out 0.6s both;
            flex-shrink: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .particle-dot {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #555;
        }

        .particle-purple {
            background-color: #8A2BE2 !important;
            box-shadow: 0 0 8px #8A2BE2;
        }

        .particle-purple .particle-dot {
            background-color: #8A2BE2 !important;
        }

        @keyframes purple-pulse {
            0%, 100% {
                box-shadow: 0 0 8px #8A2BE2, 0 0 12px rgba(138, 43, 226, 0.4);
            }
            50% {
                box-shadow: 0 0 16px #8A2BE2, 0 0 20px rgba(138, 43, 226, 0.6);
            }
        }

        /* ============ PROGRESS SECTION ============ */
        .progress-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 80px; 
            animation: fadeInUp 0.6s ease-out 0.8s both;
        }

        .start-btn {
            padding: 14px 40px;
            background: rgba(138, 43, 226, 0.05);
            border: 1px solid #8A2BE2;
            color: #8A2BE2;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
        }

        .start-btn:hover {
            background: rgba(138, 43, 226, 0.2);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.5);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .hidden {
            display: none !important;
        }

        .progress-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        .calibration-text {
            color: #ccc;
            font-size: 18px; 
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 24px; 
        }

        .progress-bar-container {
            width: 500px;
            height: 4px;
            background-color: #222;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 8px; 
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #8A2BE2;
            box-shadow: 0 0 10px #8A2BE2, inset 0 0 4px rgba(138, 43, 226, 0.5);
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            width: 500px;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .stat-percentage {
            font-size: 11px;
            color: #8A2BE2;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        /* ============ COMPLETION MESSAGE ============ */
        .completion-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-out;
        }

        .completion-message.show {
            opacity: 1;
        }

        /* ============ ANIMATIONS ============ */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span class="status-text">Openbci Live</span>
        </div>

        <div class="title-section">
            <h1 class="title">
                <span class="title-neuro">NEURO</span><span class="title-flow">FOCUS</span>
            </h1>
            <p class="subtitle">Calibration Phase</p>
        </div>

        <div class="simulator-circle" id="simulatorCircle"></div>

        <div class="progress-section">
            <button id="startBtn" class="start-btn">Start Calibration</button>
            
            <div id="progressContent" class="progress-content hidden">
                <p class="calibration-text">Calibrating... Keep Relaxing</p>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <div class="progress-stats">
                    <span class="stat-label">Signal Lock</span>
                    <span class="stat-percentage" id="progressPercentage">0%</span>
                </div>
            </div>
        </div>

        <div class="completion-message" id="completionMessage">
            Calibration Complete
        </div>
    </div>

    <script>
        const CONFIG = {
            CIRCLE_RADIUS: 175,
            PARTICLE_COUNT: 18,
            PURPLE_PARTICLE_COUNT: 3,
            PARTICLE_SIZE_MIN: 3,
            PARTICLE_SIZE_MAX: 6,
            ANIMATION_DURATION: 12000, // 总时长（不含停顿）
            PAUSE_TIME: 2000,         // 在 25% 处停顿的时间（2秒）
            COMPLETION_DELAY: 1500,
        };

        class Particle {
            constructor(isPurple = false) {
                this.isPurple = isPurple;
                this.size = Math.random() * (CONFIG.PARTICLE_SIZE_MAX - CONFIG.PARTICLE_SIZE_MIN) + CONFIG.PARTICLE_SIZE_MIN;
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * CONFIG.CIRCLE_RADIUS * 0.7;
                this.x = Math.cos(angle) * distance;
                this.y = Math.sin(angle) * distance;
                const speed = 0.3 + Math.random() * 0.5;
                const velocityAngle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(velocityAngle) * speed;
                this.vy = Math.sin(velocityAngle) * speed;
                this.element = document.createElement('div');
                this.element.className = `particle ${isPurple ? 'particle-purple' : ''}`;
                this.element.style.width = `${this.size}px`;
                this.element.style.height = `${this.size}px`;
                this.element.style.left = `calc(50% + ${this.x}px - ${this.size / 2}px)`;
                this.element.style.top = `calc(50% + ${this.y}px - ${this.size / 2}px)`;
                if (isPurple) {
                    this.element.style.animation = 'purple-pulse 3s ease-in-out infinite';
                }
                const dot = document.createElement('div');
                dot.className = 'particle-dot';
                this.element.appendChild(dot);
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                const distance = Math.sqrt(this.x ** 2 + this.y ** 2);
                const maxDistance = CONFIG.CIRCLE_RADIUS - this.size / 2;
                if (distance > maxDistance) {
                    const angle = Math.atan2(this.y, this.x);
                    this.x = Math.cos(angle) * maxDistance;
                    this.y = Math.sin(angle) * maxDistance;
                    const bounceAngle = angle + Math.PI + (Math.random() - 0.5) * 0.4;
                    const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
                    this.vx = Math.cos(bounceAngle) * speed;
                    this.vy = Math.sin(bounceAngle) * speed;
                }
                this.element.style.left = `calc(50% + ${this.x}px - ${this.size / 2}px)`;
                this.element.style.top = `calc(50% + ${this.y}px - ${this.size / 2}px)`;
            }
        }

        class ParticleManager {
            constructor(container) {
                this.container = container;
                this.particles = [];
                this.animationId = null;
                this.init();
            }
            init() {
                for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                    const isPurple = i < CONFIG.PURPLE_PARTICLE_COUNT;
                    const particle = new Particle(isPurple);
                    this.particles.push(particle);
                    this.container.appendChild(particle.element);
                }
                this.animate();
            }
            animate = () => {
                this.particles.forEach(particle => particle.update());
                this.animationId = requestAnimationFrame(this.animate);
            }
            stop() {
                if (this.animationId) cancelAnimationFrame(this.animationId);
            }
        }

        class CalibrationController {
            constructor() {
                this.isComplete = false;
                this.startBtn = document.getElementById('startBtn');
                this.progressContent = document.getElementById('progressContent');
                this.progressBar = document.getElementById('progressBarFill');
                this.progressPercentage = document.getElementById('progressPercentage');
                this.completionMessage = document.getElementById('completionMessage');
                this.simulatorCircle = document.getElementById('simulatorCircle');
                this.particleManager = new ParticleManager(this.simulatorCircle);

                this.startBtn.addEventListener('click', () => {
                    this.startBtn.classList.add('hidden');
                    this.progressContent.classList.remove('hidden');
                    this.startCalibration();
                });
            }

            startCalibration() {
                this.startTime = Date.now(); 

                const updateInterval = setInterval(() => {
                    if (this.isComplete) {
                        clearInterval(updateInterval);
                        return;
                    }

                    const elapsed = Date.now() - this.startTime;
                    let progress = 0;

                    // 计算非线性进度逻辑
                    // 1. 第一阶段: 0% -> 25% (用掉总时长的 1/4)
                    const firstPhaseDuration = CONFIG.ANIMATION_DURATION / 4;
                    
                    if (elapsed < firstPhaseDuration) {
                        progress = (elapsed / firstPhaseDuration) * 25;
                    } 
                    // 2. 第二阶段: 卡在 25% (持续 PAUSE_TIME)
                    else if (elapsed < firstPhaseDuration + CONFIG.PAUSE_TIME) {
                        progress = 25;
                    } 
                    // 3. 第三阶段: 25% -> 100% (加速载入，用掉剩余时长)
                    else {
                        const remainingElapsed = elapsed - firstPhaseDuration - CONFIG.PAUSE_TIME;
                        const remainingDuration = CONFIG.ANIMATION_DURATION * 0.75; // 剩余 75% 的进度
                        // 加快速度：我们将原本需要 0.75 时长的进度在更短时间内完成
                        // 这里设置加速倍率为 1.5
                        const accelFactor = 1.8; 
                        progress = 25 + (remainingElapsed / (remainingDuration / accelFactor)) * 75;
                    }

                    progress = Math.min(progress, 100);

                    this.progressBar.style.width = `${progress}%`;
                    this.progressPercentage.textContent = `${Math.round(progress)}%`;

                    if (progress >= 100) {
                        this.complete();
                        clearInterval(updateInterval);
                    }
                }, 30);
            }

            complete() {
                this.isComplete = true;
                this.particleManager.stop();
                this.completionMessage.classList.add('show');
                this.progressPercentage.style.color = '#10B981';
                this.progressPercentage.textContent = '100%';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, CONFIG.COMPLETION_DELAY);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new CalibrationController();
        });
    </script>
</body>
</html>
