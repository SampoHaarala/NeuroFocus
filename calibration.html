<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroFOCUS - Calibration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 强制无滚动条，占满全屏 */
            overflow: hidden; 
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        /* ============ STATUS BADGE ============ */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 1px solid #333;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            margin-bottom: 28px;
            animation: fadeInDown 0.6s ease-out 0.2s both;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10B981;
            box-shadow: 0 0 8px #10B981;
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .status-text {
            font-size: 11px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 8px #10B981, 0 0 12px rgba(16, 185, 129, 0.4);
                opacity: 0.8;
            }
            50% {
                box-shadow: 0 0 16px #10B981, 0 0 24px rgba(16, 185, 129, 0.6);
                opacity: 1;
            }
        }

        /* ============ TITLE ============ */
        .title-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out 0.4s both;
        }

        .title {
            font-size: 56px;
            font-weight: 300;
            letter-spacing: 4px;
            line-height: 1;
        }

        .title-neuro {
            color: #ffffff;
        }

        .title-flow {
            color: #8A2BE2;
            text-shadow: 0 0 10px #8A2BE2, 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .subtitle {
            font-size: 11px;
            color: #666;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* ============ CENTER SIMULATOR CIRCLE ============ */
        .simulator-circle {
            position: relative;
            width: 350px;
            height: 350px;
            aspect-ratio: 1 / 1;
            border: 1px solid #333;
            border-radius: 50%;
            /* 减小了这里的margin，为底部的按钮和放大的文字腾出空间防止页面被撑爆下滑 */
            margin-bottom: 50px; 
            animation: fadeIn 0.8s ease-out 0.6s both;
            flex-shrink: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .particle-dot {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #555;
        }

        .particle-purple {
            background-color: #8A2BE2 !important;
            box-shadow: 0 0 8px #8A2BE2;
        }

        .particle-purple .particle-dot {
            background-color: #8A2BE2 !important;
        }

        @keyframes purple-pulse {
            0%, 100% {
                box-shadow: 0 0 8px #8A2BE2, 0 0 12px rgba(138, 43, 226, 0.4);
            }
            50% {
                box-shadow: 0 0 16px #8A2BE2, 0 0 20px rgba(138, 43, 226, 0.6);
            }
        }

        /* ============ PROGRESS SECTION ============ */
        .progress-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 80px; /* 给固定高度防止切换时布局抖动 */
            animation: fadeInUp 0.6s ease-out 0.8s both;
        }

        /* 开始按钮样式 */
        .start-btn {
            padding: 14px 40px;
            background: rgba(138, 43, 226, 0.05);
            border: 1px solid #8A2BE2;
            color: #8A2BE2;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
        }

        .start-btn:hover {
            background: rgba(138, 43, 226, 0.2);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.5);
            transform: translateY(-2px);
            color: #ffffff;
        }

        /* 隐藏元素的通用类 */
        .hidden {
            display: none !important;
        }

        /* 进度条内容的容器 */
        .progress-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        .calibration-text {
            color: #ccc;
            font-size: 18px; /* 字体改大 */
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 24px; /* 增加下边距，让文字看起来向上移动了一点 */
        }

        .progress-bar-container {
            width: 500px;
            height: 4px;
            background-color: #222;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 8px; /* 进度条和下面数据的间距 */
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #8A2BE2;
            box-shadow: 0 0 10px #8A2BE2, inset 0 0 4px rgba(138, 43, 226, 0.5);
            transition: width 0.1s linear;
            border-radius: 2px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            width: 500px;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .stat-percentage {
            font-size: 11px;
            color: #8A2BE2;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        /* ============ COMPLETION MESSAGE ============ */
        .completion-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-out;
        }

        .completion-message.show {
            opacity: 1;
        }

        /* ============ ANIMATIONS ============ */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-badge">
            <div class="status-dot"></div>
            <span class="status-text">Openbci Live</span>
        </div>

        <div class="title-section">
            <h1 class="title">
                <span class="title-neuro">NEURO</span><span class="title-flow">FOCUS</span>
            </h1>
            <p class="subtitle">Calibration Phase</p>
        </div>

        <div class="simulator-circle" id="simulatorCircle"></div>

        <div class="progress-section">
            <button id="startBtn" class="start-btn">Start Calibration</button>
            
            <div id="progressContent" class="progress-content hidden">
                <p class="calibration-text">Calibrating... Keep Relaxing</p>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <div class="progress-stats">
                    <span class="stat-label">Signal Lock</span>
                    <span class="stat-percentage" id="progressPercentage">0%</span>
                </div>
            </div>
        </div>

        <div class="completion-message" id="completionMessage">
            Calibration Complete
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        const CONFIG = {
            CIRCLE_RADIUS: 175, // 350px diameter / 2
            PARTICLE_COUNT: 18,
            PURPLE_PARTICLE_COUNT: 3,
            PARTICLE_SIZE_MIN: 3,
            PARTICLE_SIZE_MAX: 6,
            ANIMATION_DURATION: 15000, // 15 seconds
            COMPLETION_DELAY: 1500, // 1.5 seconds
        };

        // ============ PARTICLE SYSTEM ============
        class Particle {
            constructor(isPurple = false) {
                this.isPurple = isPurple;
                this.size = Math.random() * (CONFIG.PARTICLE_SIZE_MAX - CONFIG.PARTICLE_SIZE_MIN) + CONFIG.PARTICLE_SIZE_MIN;

                // Random position within circle
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * CONFIG.CIRCLE_RADIUS * 0.7;
                this.x = Math.cos(angle) * distance;
                this.y = Math.sin(angle) * distance;

                // Random velocity
                const speed = 0.3 + Math.random() * 0.5;
                const velocityAngle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(velocityAngle) * speed;
                this.vy = Math.sin(velocityAngle) * speed;

                // Create DOM element
                this.element = document.createElement('div');
                this.element.className = `particle ${isPurple ? 'particle-purple' : ''}`;
                this.element.style.width = `${this.size}px`;
                this.element.style.height = `${this.size}px`;
                this.element.style.left = `calc(50% + ${this.x}px - ${this.size / 2}px)`;
                this.element.style.top = `calc(50% + ${this.y}px - ${this.size / 2}px)`;

                if (isPurple) {
                    this.element.style.animation = 'purple-pulse 3s ease-in-out infinite';
                }

                const dot = document.createElement('div');
                dot.className = 'particle-dot';
                this.element.appendChild(dot);
            }

            update() {
                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Boundary detection with bounce
                const distance = Math.sqrt(this.x ** 2 + this.y ** 2);
                const maxDistance = CONFIG.CIRCLE_RADIUS - this.size / 2;

                if (distance > maxDistance) {
                    // Calculate bounce
                    const angle = Math.atan2(this.y, this.x);
                    this.x = Math.cos(angle) * maxDistance;
                    this.y = Math.sin(angle) * maxDistance;

                    // Reverse velocity with slight angle variation
                    const bounceAngle = angle + Math.PI + (Math.random() - 0.5) * 0.4;
                    const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
                    this.vx = Math.cos(bounceAngle) * speed;
                    this.vy = Math.sin(bounceAngle) * speed;
                }

                // Update DOM position
                this.element.style.left = `calc(50% + ${this.x}px - ${this.size / 2}px)`;
                this.element.style.top = `calc(50% + ${this.y}px - ${this.size / 2}px)`;
            }
        }

        // ============ PARTICLE MANAGER ============
        class ParticleManager {
            constructor(container) {
                this.container = container;
                this.particles = [];
                this.animationId = null;

                this.init();
            }

            init() {
                // Create particles
                for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                    const isPurple = i < CONFIG.PURPLE_PARTICLE_COUNT;
                    const particle = new Particle(isPurple);
                    this.particles.push(particle);
                    this.container.appendChild(particle.element);
                }

                // Start animation loop (小球一开始就处于游离状态)
                this.animate();
            }

            animate = () => {
                this.particles.forEach(particle => particle.update());
                this.animationId = requestAnimationFrame(this.animate);
            }

            stop() {
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
            }
        }

        // ============ CALIBRATION CONTROLLER ============
        class CalibrationController {
            constructor() {
                this.isComplete = false;
                
                // 抓取 DOM 元素
                this.startBtn = document.getElementById('startBtn');
                this.progressContent = document.getElementById('progressContent');
                this.progressBar = document.getElementById('progressBarFill');
                this.progressPercentage = document.getElementById('progressPercentage');
                this.completionMessage = document.getElementById('completionMessage');
                this.simulatorCircle = document.getElementById('simulatorCircle');

                // 初始化粒子系统
                this.particleManager = new ParticleManager(this.simulatorCircle);

                // 绑定按钮点击事件
                this.startBtn.addEventListener('click', () => {
                    this.startBtn.classList.add('hidden');
                    this.progressContent.classList.remove('hidden');
                    this.startCalibration();
                });
            }

            startCalibration() {
                // 点击后才开始记录时间
                this.startTime = Date.now(); 

                const updateInterval = setInterval(() => {
                    if (this.isComplete) {
                        clearInterval(updateInterval);
                        return;
                    }

                    const elapsed = Date.now() - this.startTime;
                    const progress = Math.min((elapsed / CONFIG.ANIMATION_DURATION) * 100, 100);

                    // Update progress bar
                    this.progressBar.style.width = `${progress}%`;
                    this.progressPercentage.textContent = `${Math.round(progress)}%`;

                    // Check completion
                    if (progress >= 100) {
                        this.complete();
                        clearInterval(updateInterval);
                    }
                }, 50);
            }

            complete() {
                this.isComplete = true;
                this.particleManager.stop();

                // Show completion message
                this.completionMessage.classList.add('show');

                // Change text color to green
                this.progressPercentage.style.color = '#10B981';
                this.progressPercentage.textContent = '100%';

                // Redirect after delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, CONFIG.COMPLETION_DELAY);
            }
        }

        // ============ INITIALIZE ============
        document.addEventListener('DOMContentLoaded', () => {
            new CalibrationController();
        });
    </script>
</body>
</html>
